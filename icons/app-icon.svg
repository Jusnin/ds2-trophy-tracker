<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%"  stop-color="#211a10"/>
      <stop offset="55%" stop-color="#120f0a"/>
      <stop offset="100%" stop-color="#080705"/>
    </radialGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f7cf73"/>
      <stop offset="50%" stop-color="#e0a84e"/>
      <stop offset="100%" stop-color="#a85f23"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ember ring -->
  <g filter="url(#glow)">
    <circle cx="256" cy="250" r="150" fill="none" stroke="url(#ember)" stroke-width="20" stroke-linecap="round"
            stroke-dasharray="858 85" transform="rotate(-90 256 250)"/>
  </g>

  <!-- bonfire flame in the centre -->
  <g filter="url(#glow)" fill="url(#ember)">
    <path d="M256 150
             C 236 196, 210 214, 210 262
             C 210 312, 248 340, 256 360
             C 264 340, 302 312, 302 262
             C 302 224, 282 206, 272 178
             C 268 200, 256 210, 250 224
             C 246 200, 252 174, 256 150 Z"/>
  </g>

  <!-- roman numeral II -->
  <g font-family="Cinzel, 'Times New Roman', serif" font-weight="700" fill="#f7cf73" text-anchor="middle">
    <text x="256" y="452" font-size="70" letter-spacing="6" filter="url(#glow)">II</text>
  </g>
</svg>
